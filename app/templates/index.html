<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NomadStack — Travel Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
</head>
<body>

<div class="container">
  <header>
    <h1>NomadStack</h1>
    <p>Travel Intelligence Dashboard</p>
  </header>

  <div class="search-card">
    <form id="search-form" class="search-row">
      <input
        type="text"
        id="city-input"
        placeholder="Search a city… e.g. Paris"
        required
        minlength="2"
        autocomplete="off"
      />
      <select id="currency-select">
        <option value="EUR" selected>EUR</option>
      </select>
      <button type="submit" id="search-btn">Search</button>
    </form>
  </div>

  <div id="error" class="error"></div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Fetching travel data…</p>
  </div>

  <div id="results" class="results">
    <div class="result-header">
      <div class="score-ring">
        <svg width="80" height="80" viewBox="0 0 80 80">
          <circle class="bg-circle" cx="40" cy="40" r="34" />
          <circle
            id="score-circle"
            class="value-circle"
            cx="40"
            cy="40"
            r="34"
            stroke-dasharray="0"
            stroke-dashoffset="0"
          />
        </svg>
        <div class="score-text" id="score-value">0</div>
      </div>
      <div class="city-info">
        <h2 id="city-name">—</h2>
        <p class="rec" id="rec-text">Travel Score</p>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Temperature</h3>
        <div class="value" id="weather-temp">—</div>
        <div class="sub" id="weather-cond">—</div>
      </div>

      <div class="card">
        <h3>Exchange Rate</h3>
        <div class="value" id="exchange-base">—</div>
        <div class="sub" id="exchange-rate">—</div>
      </div>

      <div class="card full">
        <h3>Weather Details</h3>
        <div id="weather-details"></div>
      </div>

      <div class="card full" id="rec-card">
        <h3>Recommendation</h3>
        <div class="value">—</div>
      </div>
    </div>
  </div>

  <footer>
    Built with <a href="https://fastapi.tiangolo.com" target="_blank">FastAPI</a> &middot;
    <a href="/docs" target="_blank">API Docs</a> &middot;
    <a href="https://github.com/neoastra303/NomadStack-API" target="_blank">GitHub</a>
  </footer>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
